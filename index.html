<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Gyan | Hydropower Analytics</title>
    
    <!-- External Libraries -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --primary: #1a3a5f; --accent: #2a9d8f; --bg: #f4f7f6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: #333; }
        
        header { background: var(--primary); color: white; padding: 30px 5%; text-align: center; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; padding: 20px 5%; }
        
        /* Analytics Cards */
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .card h3 { margin: 0; color: var(--primary); font-size: 0.9rem; text-transform: uppercase; }
        .card .value { font-size: 1.8rem; font-weight: 700; color: var(--accent); margin: 10px 0; }

        /* Controls & Workbook Filter */
        .controls-bar { background: white; margin: 0 5% 20px; padding: 20px; border-radius: 10px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        select, input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; }

        /* Layout Main */
        .main-content { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; padding: 0 5% 40px; }
        #map { height: 500px; border-radius: 10px; z-index: 1; }
        .chart-container { background: white; padding: 20px; border-radius: 10px; height: 500px; }

        .table-section { margin: 0 5% 40px; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { background: var(--primary); color: white; padding: 15px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f9f9f9; cursor: pointer; }

        @media (max-width: 900px) { .main-content { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <h1>Hydropower Dashboard & Analytics</h1>
    <p>Curated by Ramkrishna Mahato | Civil Engineer & Research Analyst</p>
</header>

<!-- Summary Analytics Cards -->
<div class="dashboard-grid">
    <div class="card"><h3>Total Projects</h3><div id="total-projects" class="value">0</div></div>
    <div class="card"><h3>Total Capacity (MW)</h3><div id="total-mw" class="value">0</div></div>
    <div class="card"><h3>Under Construction</h3><div id="const-mw" class="value">0 MW</div></div>
    <div class="card"><h3>Operational</h3><div id="op-mw" class="value">0 MW</div></div>
</div>

<!-- Filters -->
<div class="controls-bar">
    <div style="font-weight: bold;">Workbook View:</div>
    <select id="workbook-filter">
        <option value="all">Main Project Database</option>
        <option value="survey">Survey Licenses</option>
        <option value="construction">Construction Licenses</option>
    </select>
    <input type="text" id="search" placeholder="Search by Project, River, or District..." style="flex-grow: 1;">
</div>

<div class="main-content">
    <div id="map"></div>
    <div class="chart-container">
        <h4 style="text-align:center; margin-top:0;">Capacity by Status (MW)</h4>
        <canvas id="capacityChart"></canvas>
    </div>
</div>

<div class="table-section">
    <table>
        <thead>
            <tr>
                <th>S.N.</th>
                <th>Project Name</th>
                <th>Capacity (MW)</th>
                <th>River</th>
                <th>Promoter</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<script>
let rawData = [], map, markers = [], capacityChart;

// 1. Initialize Map
map = L.map("map").setView([28.3949, 84.1240], 7);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

// 2. Fetch Data (Your Google Sheet CSV)
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTvwf-HpJkJ55xmAU623qEZPc6rzudFF9IuuLym_sFt6Dh1Xs4mTqeCo9e1BQdCCSa2NACgPbD3SBdv/pub?output=csv";

Papa.parse(csvUrl, {
    download: true,
    header: true,
    complete: results => {
        rawData = results.data.filter(d => d.Project || d.name);
        updateDashboard();
    }
});

function updateDashboard() {
    const searchTerm = document.getElementById("search").value.toLowerCase();
    const workbook = document.getElementById("workbook-filter").value;
    
    // Filter logic
    const filtered = rawData.filter(d => {
        const matchesSearch = Object.values(d).some(v => String(v).toLowerCase().includes(searchTerm));
        const status = (d.Status || d.status || "").toLowerCase();
        
        // Mock Workbook Filtering based on Status
        let matchesWorkbook = true;
        if(workbook === "survey") matchesWorkbook = status.includes("survey");
        if(workbook === "construction") matchesWorkbook = status.includes("construction");
        
        return matchesSearch && matchesWorkbook;
    });

    renderStats(filtered);
    renderMap(filtered);
    renderTable(filtered);
    renderChart(filtered);
}

function renderStats(data) {
    const totalMw = data.reduce((sum, d) => sum + parseFloat(d["Capacity (MW)"] || d.capacity_mw || 0), 0);
    const constMw = data.filter(d => (d.Status || "").includes("Construction")).reduce((sum, d) => sum + parseFloat(d["Capacity (MW)"] || 0), 0);
    const opMw = data.filter(d => (d.Status || "").includes("Operational")).reduce((sum, d) => sum + parseFloat(d["Capacity (MW)"] || 0), 0);
    
    document.getElementById("total-projects").innerText = data.length;
    document.getElementById("total-mw").innerText = totalMw.toFixed(1);
    document.getElementById("const-mw").innerText = constMw.toFixed(1) + " MW";
    document.getElementById("op-mw").innerText = opMw.toFixed(1) + " MW";
}

function renderMap(data) {
    markers.forEach(m => map.removeLayer(m));
    markers = [];
    data.forEach(d => {
        const lat = d.Latitude || d.latitude;
        const lng = d.Longitude || d.longitude;
        if(lat && lng) {
            const m = L.marker([+lat, +lng]).addTo(map)
                .bindPopup(`<b>${d.Project || d.name}</b><br>${d["Capacity (MW)"]} MW`);
            markers.push(m);
        }
    });
}

function renderTable(data) {
    const body = document.getElementById("table-body");
    body.innerHTML = data.slice(0, 50).map((d, i) => `
        <tr onclick="map.setView([${d.Latitude}, ${d.Longitude}], 12)">
            <td>${i+1}</td>
            <td style="font-weight:bold">${d.Project || d.name}</td>
            <td>${d["Capacity (MW)"] || d.capacity_mw}</td>
            <td>${d.River || d.river}</td>
            <td>${d.Promoter || "-"}</td>
            <td><span style="background:#e0f2f1; padding:3px 8px; border-radius:4px;">${d.Status || d.status}</span></td>
        </tr>
    `).join("");
}

function renderChart(data) {
    const ctx = document.getElementById('capacityChart').getContext('2d');
    const statusCounts = {};
    data.forEach(d => {
        const s = d.Status || d.status || "Unknown";
        statusCounts[s] = (statusCounts[s] || 0) + parseFloat(d["Capacity (MW)"] || 0);
    });

    if(capacityChart) capacityChart.destroy();
    capacityChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: Object.keys(statusCounts),
            datasets: [{
                data: Object.values(statusCounts),
                backgroundColor: ['#1a3a5f', '#2a9d8f', '#e76f51', '#f4a261']
            }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
}

document.getElementById("search").oninput = updateDashboard;
document.getElementById("workbook-filter").onchange = updateDashboard;
</script>

</body>
</html>
