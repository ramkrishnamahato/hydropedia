<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Gyan | Hydropower Analytics</title>
    
    <!-- Leaflet & CSV Parser -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

    <style>
        :root { --primary: #1a3a5f; --accent: #2a9d8f; --bg: #f4f7f6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; }
        header { background: var(--primary); color: white; padding: 20px 5%; text-align: center; }
        
        .controls { 
            background: white; margin: 20px 5%; padding: 20px; border-radius: 8px; 
            display: flex; flex-wrap: wrap; gap: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 5px; flex: 1; min-width: 200px; }

        #map { height: 500px; margin: 0 5% 20px; border-radius: 8px; border: 1px solid #ddd; z-index: 1; }

        .table-container { margin: 0 5% 40px; background: white; border-radius: 8px; overflow-x: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; min-width: 1300px; }
        th { background: var(--primary); color: white; padding: 12px; text-align: left; position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f1f7f6; cursor: pointer; }
        
        .status-badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.75rem; }
    </style>
</head>
<body>

<header>
    <h1>Hydropower Projects of Nepal</h1>
    <!-- <p>DOED Format Dashboard | Developed by Ramkrishna Mahato, Civil Engineer</p> -->
</header>

<div class="controls">
    <select id="workbook-filter">
        <option value="">Select Workbook (All Sheets)</option>
        <option value="Survey Licensed">Survey Licensed</option>
        <option value="Under Construction">Under Construction</option>
        <option value="Operational">Operational</option>
    </select>
    <input type="text" id="search-input" placeholder="Search Project, River, Promoter, or District...">
</div>

<div id="map"></div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>S No</th>
                <th>Project</th>
                <th>Capacity (MW)</th>
                <th>River</th>
                <th>Lic No</th>
                <th>Issue Date</th>
                <th>Validity</th>
                <th>Promoter</th>
                <th>Address</th>
                <th>Latitude N</th>
                <th>Longitude E</th>
                <th>VDC/District</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<script>
let rawData = [], map, markers = [], boundaryLayer;

// Initialize Map
map = L.map("map").setView([28.3949, 84.1240], 7);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '© OpenStreetMap contributors'
}).addTo(map);

// Fetch CSV Data
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTvwf-HpJkJ55xmAU623qEZPc6rzudFF9IuuLym_sFt6Dh1Xs4mTqeCo9e1BQdCCSa2NACgPbD3SBdv/pub?output=csv";

Papa.parse(csvUrl, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: results => {
        rawData = results.data;
        renderDashboard();
    }
});

function renderDashboard() {
    const searchTerm = document.getElementById("search-input").value.toLowerCase();
    const workbookFilter = document.getElementById("workbook-filter").value;
    const tableBody = document.getElementById("table-body");
    
    tableBody.innerHTML = "";
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    const filtered = rawData.filter(d => {
        // Robust filtering logic
        const pName = (d.Project || d.name || "").toLowerCase();
        const river = (d.River || "").toLowerCase();
        const dist = (d["VDC/District"] || d.District || "").toLowerCase();
        const prom = (d.Promoter || "").toLowerCase();
        const status = (d.Status || "").toLowerCase();

        const matchesSearch = pName.includes(searchTerm) || river.includes(searchTerm) || dist.includes(searchTerm) || prom.includes(searchTerm);
        const matchesWorkbook = !workbookFilter || status === workbookFilter.toLowerCase();

        return matchesSearch && matchesWorkbook;
    });

    filtered.forEach((d, index) => {
        const row = document.createElement("tr");
        const lat = parseFloat(d["Latitude N"] || d.Latitude || d.latitude);
        const lng = parseFloat(d["Longitude E"] || d.Longitude || d.longitude);

        row.innerHTML = `
            <td>${index + 1}</td>
            <td style="color:var(--primary); font-weight:bold;">${d.Project || d.name || "-"}</td>
            <td>${d["Capacity (MW)"] || d.capacity_mw || "-"}</td>
            <td>${d.River || d.river || "-"}</td>
            <td>${d["Lic No"] || "-"}</td>
            <td>${d["Issue Date"] || "-"}</td>
            <td>${d.Validity || "-"}</td>
            <td>${d.Promoter || "-"}</td>
            <td>${d.Address || "-"}</td>
            <td>${lat || "-"}</td>
            <td>${lng || "-"}</td>
            <td>${d["VDC/District"] || d.district || "-"}</td>
        `;

        row.onclick = () => focusProject(lat, lng, d.Project || d.name, d["Capacity (MW)"]);
        tableBody.appendChild(row);

        if (lat && lng) {
            const m = L.marker([lat, lng]).addTo(map)
                .bindPopup(`<b>${d.Project || d.name}</b><br>${d["Capacity (MW)"]} MW`);
            markers.push(m);
        }
    });
}

function focusProject(lat, lng, name, capacity) {
    if (!lat || !lng) return;

    // 1. Navigate to Coordinates
    map.setView([lat, lng], 14);

    // 2. Remove existing boundary
    if (boundaryLayer) map.removeLayer(boundaryLayer);

    // 3. Draw Project Boundary (Simulated Polygon based on capacity)
    // In professional civil engineering, boundaries are polygons. 
    // Here we simulate a catchment/concession area using a circle relative to MW.
    const radius = Math.sqrt(parseFloat(capacity || 1)) * 500; // Radius in meters
    boundaryLayer = L.circle([lat, lng], {
        color: '#2a9d8f',
        fillColor: '#2a9d8f',
        fillOpacity: 0.2,
        radius: radius
    }).addTo(map);

    L.popup()
        .setLatLng([lat, lng])
        .setContent(`<strong>Project Site: ${name}</strong><br>Simulated Boundary Area`)
        .openOn(map);
}

// Event Listeners
document.getElementById("search-input").oninput = renderDashboard;
document.getElementById("workbook-filter").onchange = renderDashboard;
</script>

</body>
</html>
